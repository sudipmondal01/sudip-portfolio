<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages 404 redirect for Angular SPA
    // Preserves the requested path for Angular router
    var pathSegments = window.location.pathname.split('/').filter(Boolean);
    sessionStorage.redirect = '/' + pathSegments.join('/');
    window.location.replace('/');
  </script>
</head>
<body>
</body>
</html>
